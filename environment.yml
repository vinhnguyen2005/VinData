# Datathon 2026 — The Gridbreakers
# Tạo môi trường: conda env create -f environment.yml
# Kích hoạt:      conda activate datathon2026

name: datathon2026
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pandas>=2.0
  - numpy>=1.24
  - pyarrow>=12.0
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - matplotlib>=3.7
  - seaborn>=0.12
  - plotly>=5.18
  - jupyterlab>=4.0
  - ipykernel
  - pip
  - pip:
      - xgboost>=2.0
      - lightgbm>=4.0
      - shap>=0.44
      - streamlit>=1.30
      - joblib>=1.3
