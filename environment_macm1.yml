# Datathon 2026 — The Gridbreakers
# Dành cho Mac Apple Silicon (M1/M2/M3)
# Tạo môi trường: conda env create -f environment_macm1.yml
# Kích hoạt:      conda activate datathon2026_m1

name: datathon2026_m1
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pandas>=2.0
  - numpy>=1.24
  - pyarrow>=12.0
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - matplotlib>=3.7
  - seaborn>=0.12
  - plotly>=5.18
  - jupyterlab>=4.0
  - ipykernel
  - pip
  - pip:
      - xgboost>=2.0
      - lightgbm>=4.0
      - shap>=0.44
      - streamlit>=1.30
      # PyTorch cài riêng nếu cần:
      # pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
